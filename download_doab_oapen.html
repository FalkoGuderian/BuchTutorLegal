let idx = 0, running = false, timer = null;

function render() {
  const el = document.getElementById('list');
  el.innerHTML = ENTRIES.map((e, i) => `
    <div class="item" id="row${i}">
      <span class="badge ${e.source || 'doab'}">${(e.source||'doab').toUpperCase()}</span>
      <a href="${e.url}" target="_blank" download="${e.fname}" title="${e.title}">${e.title || e.fname}</a>
      <span class="status" id="st${i}">–</span>
    </div>`).join('');
}

function setStatus(i, txt, done) {
  const st = document.getElementById('st'+i);
  if (st) st.textContent = txt;
  if (done) document.getElementById('row'+i)?.classList.add('done');
}

function updateProgress() {
  const pct = idx / ENTRIES.length * 100;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('ptext').textContent =
    idx + ' / ' + ENTRIES.length + ' erledigt' + (running ? ' · läuft…' : '');
}

function triggerDownload(e) {
  const a = document.createElement('a');
  a.href = e.url;
  a.download = e.fname;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function next() {
  if (!running || idx >= ENTRIES.length) {
    running = false;
    document.getElementById('btnStart').style.display = '';
    document.getElementById('btnPause').style.display = 'none';
    updateProgress();
    return;
  }
  const e = ENTRIES[idx];
  setStatus(idx, '⬇ lädt…', false);
  // scroll into view
  document.getElementById('row'+idx)?.scrollIntoView({block:'nearest'});
  triggerDownload(e);
  setStatus(idx, '✓', true);
  idx++;
  updateProgress();
  const delay = parseInt(document.getElementById('delayMs').value);
  timer = setTimeout(next, delay);
}

function startDL() {
  if (idx >= ENTRIES.length) idx = 0;
  running = true;
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnPause').style.display = '';
  next();
}

function pauseDL() {
  running = false;
  clearTimeout(timer);
  document.getElementById('btnStart').textContent = '▶ Weiter';
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnPause').style.display = 'none';
  updateProgress();
}

function resetDL() {
  running = false;
  clearTimeout(timer);
  idx = 0;
  document.getElementById('btnStart').textContent = '▶ Download starten';
  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnPause').style.display = 'none';
  document.querySelectorAll('.item').forEach(el => el.classList.remove('done'));
  document.querySelectorAll('.status').forEach(el => el.textContent = '–');
  updateProgress();
}

render();
updateProgress();
</script>
