name: Discord Feed Sync
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch Discord messages
        run: node scripts/fetch-discord-feed.js
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_SHARING_CHANNEL_ID: ${{ secrets.DISCORD_SHARING_CHANNEL_ID }}
      - name: Publish feed to repo root
        run: |
          cp dist-feed/discord-messages.json discord-messages.json
          git config user.name "docworm-bot"
          git config user.email "bot@docworm.app"
          git add discord-messages.json
          if git diff --staged --quiet; then
            echo "No feed changes — skipping commit"
            exit 0
          fi
          git commit -m "chore: sync discord feed"
          # Retry push with rebase to handle concurrent runs
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i — pulling with rebase"
            git pull --rebase origin main || true
            sleep $((i * 2))
          done
          echo "Push failed after 5 attempts"
          exit 1
