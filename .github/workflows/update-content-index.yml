name: Update Content Index

on:
  schedule:
    - cron: '0 4 * * 1'   # Montags 4 Uhr UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Build compact app index from existing content-index.json
        run: |
          python - <<'EOF'
          import json, re
          from pathlib import Path

          FULL   = Path("content-index.json")
          OUTPUT = Path("content-index-app.json")
          KEEP   = {"title", "source", "category", "language", "pdfUrl", "webUrl", "year"}

          data = json.loads(FULL.read_text(encoding="utf-8"))
          stripped = []
          for e in data:
              entry = {k: v for k, v in e.items() if k in KEEP}
              if "year" in entry and not entry.get("year"):
                  del entry["year"]
              stripped.append(entry)
          OUTPUT.write_text(
              json.dumps(stripped, ensure_ascii=False, separators=(",", ":")),
              encoding="utf-8"
          )
          print(f"Built {len(stripped)} entries -> {OUTPUT.stat().st_size/1024/1024:.1f} MB")
          EOF

      - name: Commit and push
        run: |
          git config user.name "docworm-bot"
          git config user.email "bot@docworm.app"
          git add content-index-app.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen — kein Commit"
            exit 0
          fi
          git commit -m "chore: rebuild content-index-app.json"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push erfolgreich (Versuch $i)"
              exit 0
            fi
            echo "Push fehlgeschlagen (Versuch $i) — rebase"
            git pull --rebase origin main || true
            sleep $((i * 2))
          done
          echo "Push nach 5 Versuchen fehlgeschlagen"
          exit 1
