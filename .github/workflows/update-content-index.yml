name: Update Content Index

on:
  schedule:
    - cron: '0 4 * * 1'   # Montags 4 Uhr UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5h limit (DOAB ~2-3h for all offsets)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch all sources + build compact index
        run: python scripts/fetch_all.py

      - name: Commit and push
        run: |
          git config user.name "docworm-bot"
          git config user.email "bot@docworm.app"
          git add content-index.json content-index-app.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen — kein Commit"
            exit 0
          fi
          git commit -m "chore: weekly content index update ($(date -u +%Y-%m-%d))"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push erfolgreich (Versuch $i)"
              exit 0
            fi
            echo "Push fehlgeschlagen (Versuch $i) — rebase"
            git pull --rebase origin main || true
            sleep $((i * 2))
          done
          echo "Push nach 5 Versuchen fehlgeschlagen"
          exit 1
