name: Update Content Index

on:
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Full rebuild incl. DOAB (takes 2-3h)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Full rebuild incl. DOAB
        if: ${{ github.event.inputs.full_rebuild == 'true' }}
        run: python scripts/fetch_all.py

      - name: Build compact content-index.json
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path

          FULL  = Path("content-index.json")
          KEEP  = {"id","title","source","category","language","pdfUrl","webUrl","year"}

          data = json.loads(FULL.read_text(encoding="utf-8"))
          stripped = []
          for e in data:
              entry = {k: v for k, v in e.items() if k in KEEP}
              if "year" in entry and not entry.get("year"):
                  del entry["year"]
              stripped.append(entry)
          FULL.write_text(
              json.dumps(stripped, ensure_ascii=False, separators=(",",":")),
              encoding="utf-8"
          )
          print(f"{len(stripped)} entries, {FULL.stat().st_size/1024/1024:.1f} MB")
          EOF

      - name: Commit and push
        run: |
          git config user.name "docworm-bot"
          git config user.email "bot@docworm.app"
          git add content-index.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen — kein Commit"
            exit 0
          fi
          git commit -m "chore: update content-index.json $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            git pull --rebase origin main || true
            sleep $((i * 2))
          done
          exit 1
