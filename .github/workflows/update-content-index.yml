name: Update Content Index

on:
  schedule:
    - cron: '0 4 * * 1'   # Montags 4 Uhr UTC
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Full rebuild incl. DOAB (takes 2-3h)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Update arXiv entries (weekly, fast ~5min)
        if: ${{ github.event.inputs.full_rebuild != 'true' }}
        run: |
          python - <<'EOF'
          import json, re, time, urllib.request
          from pathlib import Path
          from datetime import date

          INDEX = Path("content-index.json")
          TODAY = date.today().isoformat()
          UA = "DocWorm-ContentIndexer/1.0"

          CATS = [
            ("cs.AI","cat_cs_tech"),("cs.LG","cat_cs_tech"),("cs.CV","cat_cs_tech"),
            ("cs.CL","cat_cs_tech"),("cs.SE","cat_cs_tech"),("cs.CR","cat_cs_tech"),
            ("cs.DS","cat_cs_tech"),("math.CA","cat_math_science"),
            ("math.ST","cat_math_science"),("math.NA","cat_math_science"),
            ("math.PR","cat_math_science"),("math.AG","cat_math_science"),
            ("physics.ed-ph","cat_math_science"),("q-bio.NC","cat_health"),
            ("econ.GN","cat_business"),("econ.EM","cat_business"),
            ("stat.ML","cat_math_science"),("stat.AP","cat_math_science"),
          ]

          data = json.loads(INDEX.read_text(encoding="utf-8"))
          existing_ids = {e["id"] for e in data if e.get("source") == "arxiv"}
          new_entries = []

          for cat, category in CATS:
            url = f"https://export.arxiv.org/api/query?search_query=cat:{cat}&sortBy=submittedDate&sortOrder=descending&max_results=20"
            for attempt in range(3):
              try:
                req = urllib.request.Request(url, headers={"User-Agent": UA})
                with urllib.request.urlopen(req, timeout=30) as r:
                  xml = r.read().decode("utf-8")
                ids = re.findall(r"<id>http://arxiv\.org/abs/([^<]+)</id>", xml)
                titles = re.findall(r"<title>([^<]+)</title>", xml)[1:]
                pubs = re.findall(r"<published>([^<]+)</published>", xml)
                for arxiv_id, title, pub in zip(ids, titles, pubs):
                  safe = arxiv_id.strip().replace("/","-")
                  eid = f"arxiv-{safe}"
                  if eid in existing_ids: continue
                  new_entries.append({
                    "id": eid, "title": title.strip(), "source": "arxiv",
                    "domain": "general", "category": category, "tags": [cat],
                    "language": "en", "webUrl": f"https://arxiv.org/abs/{arxiv_id.strip()}",
                    "pdfUrl": f"https://arxiv.org/pdf/{arxiv_id.strip()}",
                    "year": pub[:4], "license": "arXiv non-exclusive", "updated": TODAY
                  })
                break
              except Exception as e:
                time.sleep(20)
            time.sleep(4)

          print(f"New arXiv entries: {len(new_entries)}")
          if new_entries:
            merged = {e["id"]: e for e in data}
            for e in new_entries: merged[e["id"]] = e
            INDEX.write_text(json.dumps(list(merged.values()), indent=2, ensure_ascii=False)+"\n", encoding="utf-8")
          EOF

      - name: Full rebuild incl. DOAB (manual trigger only)
        if: ${{ github.event.inputs.full_rebuild == 'true' }}
        run: python scripts/fetch_all.py

      - name: Build compact app index
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path

          FULL   = Path("content-index.json")
          OUTPUT = Path("content-index-app.json")
          KEEP   = {"title","source","category","language","pdfUrl","webUrl","year"}

          data = json.loads(FULL.read_text(encoding="utf-8"))
          stripped = []
          for e in data:
              entry = {k: v for k, v in e.items() if k in KEEP}
              if "year" in entry and not entry.get("year"):
                  del entry["year"]
              stripped.append(entry)
          OUTPUT.write_text(
              json.dumps(stripped, ensure_ascii=False, separators=(",",":")),
              encoding="utf-8"
          )
          print(f"{len(stripped)} entries, {OUTPUT.stat().st_size/1024/1024:.1f} MB")
          EOF

      - name: Commit and push
        run: |
          git config user.name "docworm-bot"
          git config user.email "bot@docworm.app"
          git add content-index.json content-index-app.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen — kein Commit"
            exit 0
          fi
          git commit -m "chore: weekly index update $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            git pull --rebase origin main || true
            sleep $((i * 2))
          done
          exit 1
